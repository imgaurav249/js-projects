<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foodie Hamburger</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="./images/img0.svg" alt="Foodie Logo" />
      </div>
      <nav>
        <a href="#top-picks">Top Picks</a>
        <a href="#whopper">Whopper</a>
        <a href="#snack-menu">Snack Menu</a>
        <a href="#new-collection">New Foodie Collection</a>
        <a href="#deal-of-the-day">Deal of the Day</a>
      </nav>
    </header>
    <main>
        <section class="hero-section">
            <div class="img-container">
                <img src="./images/img1.svg" alt="burger1" />  
            </div>
            <p> well you can't resist anymore</p>
            </section>
            <section id="top-picks" class="section">
              <h2>Top Picks</h2>
              <div class="img-container">
                <img src="./images/img2.svg" alt="burger2" />  
            </div>
        </section>
          <section id="whopper" class="section">
              <h2>Whopper</h2>
              <div class="img-container">
                <img src="./images/img3.svg" alt="burger3" />  
            </div>
        </section>
          <section id="snack-menu" class="section">
              <h2>Snack Menu</h2>
              <div class="img-container">
                <img src="./images/img4.svg" alt="burger4" />  
            </div>
        </section>
          <section id="new-collection" class="section">
              <h2>New Foodie Collection</h2>
              <div class="img-container">
                <img src="./images/img5.svg" alt="burger5" />  
            </div>
        </section>
           </section>
          <section id="deal-of-the-day" class="section">
              <h2>Deal of the Day</h2>
              <div class="img-container">
                <img src="./images/img6.svg" alt="burger6" />  
            </div>
        </section>
        <h3 class="go-to-top">
            <a href="#">Go to Top</a>
        </h3>
    </main>
  </body>
</html>
